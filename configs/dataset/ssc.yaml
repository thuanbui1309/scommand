# SSC: Spiking Speech Commands. 100k samples, 35 classes.
dataset:
  name: ssc
  time_steps: 100
  n_bins: 140
  bin_width_ms: 10
  root: data/SSC

training:
  epochs: 300
  lr: 5.0e-3
  weight_decay: 1.0e-2

model:
  depth: 2
  dim: 256
  n_heads: 16

augmentation:
  eventdrop:
    time_drop_size_pct: 0.1
    neuron_drop_size: 10
